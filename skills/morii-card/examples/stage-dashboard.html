<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>今日健康</title>
<style>
:root{color-scheme:light dark;
--bg:light-dark(#e9ebee,#0d0d0f);--card:light-dark(#fff,#1c1c1e);
--ink:light-dark(#16181c,#f2f3f5);--mut:light-dark(#6e7480,#9ba1ac);--fnt:light-dark(#a8adb8,#5d646f);
--inset:light-dark(#f4f5f7,#26262a);--hl:color-mix(in srgb,var(--fnt) 14%,transparent);
--a:#f43f5e;--at:light-dark(#be123c,#fb7185);
--up:light-dark(#15803d,#4ade80);--dn:light-dark(#b91c1c,#f87171);--warn:light-dark(#b45309,#fbbf24);
--ez:cubic-bezier(.16,1,.3,1);
--sh:0 1px 2px light-dark(rgba(16,24,40,.04),rgba(0,0,0,.5)),0 12px 30px light-dark(rgba(16,24,40,.08),rgba(0,0,0,.45))}
[data-theme=light]{color-scheme:light}[data-theme=dark]{color-scheme:dark}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;background:var(--bg);color:var(--ink);font-family:-apple-system,system-ui,'Segoe UI',sans-serif}
.card{width:min(430px,100%);background:var(--card);border-radius:22px;padding:22px;box-shadow:var(--sh);-webkit-user-select:none;user-select:none}
.cap{font-size:.74rem;color:var(--mut)}.tn{font-variant-numeric:tabular-nums}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hd .t{display:flex;align-items:center;gap:9px}
.tile{flex:none;width:26px;height:26px;border-radius:8px;background:color-mix(in srgb,var(--a) 13%,transparent);color:var(--at);display:grid;place-items:center}
.htitle{font-size:.92rem;font-weight:700}
.ins{display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:650;color:var(--mut);margin-bottom:14px}
.ins i{flex:none;width:6px;height:6px;border-radius:99px;background:var(--warn)}
.stg{position:relative}
.sttop{display:flex;align-items:flex-start;justify-content:space-between}
.stlab{font-size:.76rem;font-weight:700;color:var(--mut);letter-spacing:.02em}
.stsub{font-size:.72rem;color:var(--fnt);margin-top:5px;font-variant-numeric:tabular-nums;min-height:16px}
.stsub b{color:var(--mut);font-weight:700}
.stval{text-align:right}
.stval b{font-size:2.5rem;font-weight:750;letter-spacing:-.03em;line-height:.95;font-variant-numeric:tabular-nums}
.stval .u{font-size:.32em;color:var(--mut);font-weight:600;margin-left:3px}
.stval .vc{font-size:.64rem;font-weight:650;margin-top:5px}
.gfx{margin-top:10px;touch-action:pan-y;display:block;width:100%;cursor:ew-resize;-webkit-user-select:none;user-select:none}
.gfx.tap{cursor:default}
.legs{display:flex;gap:7px;margin-top:13px}
.leg{flex:1;text-align:center;font-size:.65rem;color:var(--mut);font-variant-numeric:tabular-nums}
.leg .sw{height:4px;border-radius:2px;margin-bottom:6px;opacity:.9}
.tabs{display:flex;gap:8px;margin-top:18px}
.tab{flex:1;background:var(--inset);border-radius:13px;padding:10px 8px 9px;cursor:pointer;border:1.5px solid transparent;transition:border-color .18s var(--ez),background .18s var(--ez)}
.tab.on{border-color:color-mix(in srgb,var(--a) 50%,transparent);background:color-mix(in srgb,var(--a) 9%,var(--card))}
.tab .tl{font-size:.66rem;font-weight:650;color:var(--mut)}
.tab.on .tl{color:var(--at)}
.tab .tv{font-size:.92rem;font-weight:750;letter-spacing:-.02em;margin-top:2px;font-variant-numeric:tabular-nums}
.tab .tv small{font-size:.55em;color:var(--mut);font-weight:600;margin-left:1px}
.tab svg{display:block;width:100%;height:20px;margin-top:7px;overflow:visible}
.up{color:var(--up)}.dn{color:var(--dn)}.wn{color:var(--warn)}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes afade{from{opacity:0}}
@keyframes pop{from{opacity:0;transform:scale(.4)}}
@keyframes swap{from{opacity:0;transform:translateY(7px)}}
.ar{animation:afade .55s var(--ez) both}
.dt{transition:cx .16s var(--ez),cy .16s var(--ez)}
.dt.in{animation:pop .32s var(--ez) .42s both}
.swap{animation:swap .34s var(--ez)}
@media(prefers-reduced-motion:reduce){.ln{animation:none!important;stroke-dashoffset:0!important}.ar,.dt,.swap{animation:none!important}}
</style></head><body><div class="card">
<div class="hd"><div class="t"><span class="tile"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.8-9.6-9.3C1 8.4 2.6 5 6 5c2 0 3.2 1.1 4 2.3C10.8 6.1 12 5 14 5c3.4 0 5 3.4 3.6 6.7C19.5 16.2 12 21 12 21Z"/></svg></span><span class="htitle">今日健康</span></div><span class="cap">6月25日 · 周三</span></div>
<div class="ins"><i></i>整体良好 · 睡眠欠 1 小时是今日唯一短板</div>
<div class="stg" id="stg">
  <div class="sttop"><div><div class="stlab" id="stlab"></div><div class="stsub" id="stsub"></div></div>
    <div class="stval"><b id="stval">0<span class="u" id="stu"></span></b><div class="vc" id="stvc"></div></div></div>
  <svg class="gfx" id="gfx" height="122" role="img"></svg>
  <div class="legs" id="legs" style="display:none"></div>
</div>
<div class="tabs" id="tabs"></div>
</div>
<script>
const NS='http://www.w3.org/2000/svg',mk=(p,t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);p.appendChild(e);return e};
const pad=n=>String(n).padStart(2,'0'),hm=m=>pad(Math.floor(m/60)%24)+':'+pad(Math.round(m)%60),WD=['一','二','三','四','五','六','日'];
const M=[
 {k:'hr',label:'心率',unit:'BPM',type:'line',vc:['区间 58–138','wn'],
  d:[62,60,58,61,64,68,72,70,74,79,84,90,98,112,128,138,131,119,107,96,88,84,80,76,74,72,70,68,66,64,63,64,67,71,75,73,69,65,61,59],
  dft:'peak',sub:i=>'静息 <b>58</b> · 峰值 <b>138</b> · 约 '+hm(i*36)},
 {k:'step',label:'步数',unit:'步',type:'area',vc:['82% 达标','up'],
  d:[0,0,0,0,0,0,120,420,900,1500,2100,2600,3200,3900,4800,5400,5900,6400,7000,7600,8000,8200,8240,8240],
  dft:'last',sub:i=>'到 '+hm(i*60)+' 累计 · 目标 10,000'},
 {k:'sleep',label:'睡眠',unit:'',type:'sleep',vc:['欠 1h08','wn'],valt:'6h52',
  seg:[['浅',20],['深',30],['浅',35],['REM',22],['浅',40],['深',25],['浅',35],['REM',30],['浅',40],['深',25],['浅',40],['REM',30],['浅',40]],
  start:1410,sub:'共 6h52m · 低于 7–9h 建议'},
 {k:'wt',label:'体重',unit:'kg',type:'line',dec:1,vc:['7日 ▼0.8','up'],
  d:[69.3,69.1,69.0,68.9,68.8,68.8,68.5],
  dft:'last',sub:i=>'周'+WD[i]+' · BMI 21.4'},
];
const fmt=(v,dec)=>dec?v.toFixed(dec):Math.round(v).toLocaleString();
const gfx=document.getElementById('gfx'),legs=document.getElementById('legs'),stg=document.getElementById('stg'),
stlab=document.getElementById('stlab'),stsub=document.getElementById('stsub'),stval=document.getElementById('stval'),stu=document.getElementById('stu'),stvc=document.getElementById('stvc');
let cur=0,raf=0;
function addGrad(){const d=mk(gfx,'defs',{}),fg=mk(d,'linearGradient',{id:'fg',x1:0,y1:0,x2:0,y2:1});
  mk(fg,'stop',{offset:0,style:'stop-color:var(--a);stop-opacity:.24'});mk(fg,'stop',{offset:1,style:'stop-color:var(--a);stop-opacity:0'});}
function setBig(txt,unit){stval.innerHTML=txt+'<span class="u">'+unit+'</span>';}
function countTo(t,dec,unit){cancelAnimationFrame(raf);const a=performance.now();
  const f=n=>{const p=Math.min((n-a)/650,1),e=1-(1-p)**3;setBig(fmt(t*e,dec),unit);if(p<1)raf=requestAnimationFrame(f)};raf=requestAnimationFrame(f);}
function drawLine(p){const L=p.getTotalLength();p.style.strokeDasharray=L;p.style.strokeDashoffset=L;p.style.animation='draw .7s var(--ez) forwards';}
function lineChart(m){
  const W=gfx.clientWidth,L=5,R=5,T=16,B=108,d=m.d,N=d.length,lo=Math.min(...d),hi=Math.max(...d),
  X=i=>L+(W-L-R)*i/(N-1),Y=v=>B-(B-T)*(v-lo)/((hi-lo)||1),
  dd=d.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+','+Y(v).toFixed(1)).join('');
  addGrad();
  mk(gfx,'path',{class:'ar',d:dd+`L${X(N-1).toFixed(1)},${B} L${X(0).toFixed(1)},${B} Z`,style:'fill:url(#fg)'});
  const ln=mk(gfx,'path',{class:'ln',d:dd,style:'fill:none;stroke:var(--a);stroke-width:2.8;stroke-linejoin:round;stroke-linecap:round'});drawLine(ln);
  const dot=mk(gfx,'circle',{class:'dt in',r:5,style:'fill:var(--a);stroke:var(--card);stroke-width:2.5'});
  const idx0=m.dft==='peak'?d.indexOf(hi):m.dft==='last'?N-1:0;
  const place=i=>{dot.setAttribute('cx',X(i));dot.setAttribute('cy',Y(d[i]));stsub.innerHTML=m.sub(i);};
  place(idx0);countTo(d[idx0],m.dec,m.unit);
  const scrub=e=>{e.preventDefault();const r=gfx.getBoundingClientRect(),i=Math.max(0,Math.min(N-1,Math.round((e.clientX-r.left-L)/((W-L-R)/(N-1)))));
    dot.classList.remove('in');place(i);setBig(fmt(d[i],m.dec),m.unit);};
  gfx.onpointerdown=e=>{e.preventDefault();gfx.setPointerCapture(e.pointerId);scrub(e);gfx.onpointermove=scrub;};
  gfx.onpointerup=gfx.onpointercancel=()=>gfx.onpointermove=null;
}
function sleepChart(m){
  const W=gfx.clientWidth,segs=m.seg,tot=segs.reduce((a,s)=>a+s[1],0),
  lvl={'深':0,'浅':1,'REM':2},yT=24,yB=96,Y=s=>yB-(yB-yT)*lvl[s]/2,
  tints={'深':'var(--a)','浅':'color-mix(in srgb,var(--a) 56%,transparent)','REM':'color-mix(in srgb,var(--a) 34%,transparent)'};
  let x=0,dd='',marks=[];
  segs.forEach(([s,mn],i)=>{const x2=x+(W-2)*mn/tot,y=Y(s);
    dd+=(i?'L'+x.toFixed(1)+','+y:'M'+x.toFixed(1)+','+y)+' L'+x2.toFixed(1)+','+y;
    marks.push([x,x2,s,mn]);x=x2;});
  addGrad();
  mk(gfx,'path',{class:'ar',d:dd+` L${(W-2).toFixed(1)},${yB+2} L0,${yB+2} Z`,style:'fill:url(#fg)'});
  const ln=mk(gfx,'path',{class:'ln',d:dd,style:'fill:none;stroke:var(--a);stroke-width:2.8;stroke-linejoin:round;stroke-linecap:round'});drawLine(ln);
  const dot=mk(gfx,'circle',{class:'dt',r:5,style:'fill:var(--a);stroke:var(--card);stroke-width:2.5'});dot.style.opacity=0;
  setBig(m.valt,'');stsub.innerHTML=m.sub;
  const pct={'深':19,'浅':61,'REM':20},dur={'深':'1h20','浅':'4h10','REM':'1h22'};
  legs.style.display='flex';
  legs.innerHTML=['深','浅','REM'].map(s=>'<div class="leg"><div class="sw" style="background:'+tints[s]+'"></div>'+(s==='REM'?'REM':s+'睡')+' · '+pct[s]+'%</div>').join('');
  const scrub=e=>{e.preventDefault();const r=gfx.getBoundingClientRect(),px=Math.max(0,Math.min(W-2,e.clientX-r.left));
    let acc=0,seg=marks[0];for(const mk2 of marks){if(px>=mk2[0]&&px<=mk2[1]){seg=mk2;break;}}
    const cum=marks.slice(0,marks.indexOf(seg)).reduce((a,s)=>a+s[3],0)+(px-seg[0])/(seg[1]-seg[0])*seg[3];
    dot.style.opacity=1;dot.setAttribute('cx',px);dot.setAttribute('cy',Y(seg[2]));
    setBig(dur[seg[2]],'');stsub.innerHTML=hm(m.start+cum)+' · <b>'+(seg[2]==='REM'?'REM':seg[2]+'睡')+'</b>';};
  gfx.onpointerdown=e=>{e.preventDefault();gfx.setPointerCapture(e.pointerId);scrub(e);gfx.onpointermove=scrub;};
  gfx.onpointerup=gfx.onpointercancel=()=>{gfx.onpointermove=null;};
}
function render(i){cur=i;const m=M[i];gfx.innerHTML='';legs.style.display='none';legs.innerHTML='';
  stlab.textContent=m.label;stu.textContent=m.unit;stvc.textContent=m.vc[0];stvc.className='vc '+m.vc[1];
  gfx.className='gfx'+(m.type==='sleep'?' tap':'');
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));
  stg.classList.remove('swap');void stg.offsetWidth;stg.classList.add('swap');
  if(m.type==='sleep')sleepChart(m);else lineChart(m);
}
const tabs=document.getElementById('tabs');
tabs.innerHTML=M.map((m,i)=>{const v=m.type==='sleep'?m.valt:fmt(m.d[m.dft==='peak'?m.d.indexOf(Math.max(...m.d)):m.d.length-1],m.dec);
  return '<div class="tab" data-i="'+i+'"><div class="tl">'+m.label+'</div><div class="tv">'+v+(m.unit?'<small>'+m.unit+'</small>':'')+'</div><svg viewBox="0 0 60 20" preserveAspectRatio="none" data-s="'+i+'"></svg></div>';}).join('');
M.forEach((m,i)=>{const sv=tabs.querySelector('[data-s="'+i+'"]');
  if(m.type==='sleep'){let x=0;const tot=m.seg.reduce((a,s)=>a+s[1],0),lvl={'深':0,'浅':1,'REM':2},Y=s=>17-13*lvl[s]/2;
    let dd='';m.seg.forEach(([s,mn],k)=>{const x2=x+60*mn/tot;dd+=(k?'L'+x.toFixed(1)+','+Y(s):'M'+x.toFixed(1)+','+Y(s))+' L'+x2.toFixed(1)+','+Y(s);x=x2;});
    mk(sv,'path',{d:dd,style:'fill:none;stroke:color-mix(in srgb,var(--a) 60%,transparent);stroke-width:1.6;vector-effect:non-scaling-stroke;stroke-linejoin:round'});}
  else{const d=m.d,N=d.length,lo=Math.min(...d),hi=Math.max(...d),X=k=>k/(N-1)*60,Y=v=>18-16*(v-lo)/((hi-lo)||1),
    dd=d.map((v,k)=>(k?'L':'M')+X(k).toFixed(1)+','+Y(v).toFixed(1)).join('');
    mk(sv,'path',{d:dd,style:'fill:none;stroke:color-mix(in srgb,var(--a) 60%,transparent);stroke-width:1.6;vector-effect:non-scaling-stroke;stroke-linecap:round;stroke-linejoin:round'});}});
tabs.querySelectorAll('.tab').forEach(t=>t.onclick=()=>render(+t.dataset.i));
render(0);
</script></body></html>
