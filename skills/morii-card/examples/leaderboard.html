<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>本周手机销量榜</title>
<style>
:root{color-scheme:light dark;
--bg:light-dark(#e9ebee,#0d0d0f);--card:light-dark(#fff,#1c1c1e);
--ink:light-dark(#16181c,#f2f3f5);--mut:light-dark(#6e7480,#9ba1ac);--fnt:light-dark(#a8adb8,#5d646f);
--inset:light-dark(#f4f5f7,#26262a);--hl:color-mix(in srgb,var(--fnt) 14%,transparent);
--a:#6366f1;--at:light-dark(#4346ad,#a7abf7);
--up:light-dark(#15803d,#4ade80);--dn:light-dark(#b91c1c,#f87171);
--ez:cubic-bezier(.16,1,.3,1);
--sh:0 1px 2px light-dark(rgba(16,24,40,.04),rgba(0,0,0,.5)),0 12px 30px light-dark(rgba(16,24,40,.08),rgba(0,0,0,.45))}
[data-theme=light]{color-scheme:light}[data-theme=dark]{color-scheme:dark}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;background:var(--bg);color:var(--ink);font-family:-apple-system,system-ui,'Segoe UI',sans-serif}
.card{width:min(430px,100%);background:var(--card);border-radius:22px;padding:22px;box-shadow:var(--sh);-webkit-user-select:none;user-select:none}
.cap{font-size:.74rem;color:var(--mut)}.tn{font-variant-numeric:tabular-nums}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.hd .t{display:flex;align-items:center;gap:9px}
.tile{flex:none;width:28px;height:28px;border-radius:9px;background:color-mix(in srgb,var(--a) 13%,transparent);color:var(--at);display:grid;place-items:center}
.htitle{font-size:.92rem;font-weight:700}
.ins{display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:650;color:var(--mut);margin:12px 0 14px}
.ins i{flex:none;width:6px;height:6px;border-radius:99px;background:var(--a)}
.feat{position:relative;border-radius:16px;padding:15px 16px 6px;margin-bottom:14px;
  background:color-mix(in srgb,var(--a) 8%,var(--card));box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--a) 16%,transparent)}
.ftop{display:flex;align-items:flex-start;justify-content:space-between}
.frk{display:inline-flex;align-items:center;gap:7px}
.fbadge{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;font-size:.72rem;font-weight:800;color:#fff;background:var(--a)}
.fn{font-size:1.05rem;font-weight:750;letter-spacing:-.01em}
.fsub{font-size:.72rem;color:var(--mut);margin-top:6px;font-variant-numeric:tabular-nums}
.fsub b{color:var(--ink);font-weight:700}
.fval{text-align:right}
.fval b{font-size:1.9rem;font-weight:780;letter-spacing:-.02em;line-height:.95;font-variant-numeric:tabular-nums}
.fval .u{font-size:.42em;color:var(--mut);font-weight:600;margin-left:2px}
.dl{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:6px;font-variant-numeric:tabular-nums;display:inline-block;margin-top:5px}
.dup{background:color-mix(in srgb,var(--up) 16%,transparent);color:var(--up)}
.ddn{background:color-mix(in srgb,var(--dn) 15%,transparent);color:var(--dn)}
.dnw{background:color-mix(in srgb,var(--a) 14%,transparent);color:var(--at)}
.dsm{color:var(--fnt);background:var(--hl)}
.spark{display:block;width:100%;height:50px;margin-top:8px}
.row{display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:10px;padding:10px 8px;border-radius:11px;cursor:pointer;transition:background .16s var(--ez)}
.row+.row{margin-top:1px}
.row:active{transform:scale(.994)}
.row.on{background:var(--inset)}
.rk{font-size:.8rem;font-weight:700;color:var(--fnt);text-align:center;font-variant-numeric:tabular-nums}
.row.on .rk{color:var(--at)}
.mid{min-width:0}
.nm{display:flex;align-items:center;gap:8px;font-size:.88rem;font-weight:650}
.bar{height:7px;border-radius:4px;background:var(--hl);overflow:hidden;margin-top:7px}
.bar i{display:block;height:100%;border-radius:4px;background:var(--mut);transform-origin:left;animation:gx .6s var(--ez) both}
.row.on .bar i{background:var(--a)}
.rv{font-size:.92rem;font-weight:750;font-variant-numeric:tabular-nums;text-align:right}
.dm{font-size:.58rem;font-weight:700;padding:1px 6px;border-radius:5px;font-variant-numeric:tabular-nums;margin-left:7px}
@keyframes gx{from{transform:scaleX(0)}}
@media(prefers-reduced-motion:reduce){.bar i{animation:none}}
.ft{display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:11px;border-top:1px solid var(--hl)}
</style></head><body><div class="card">
<div class="hd"><div class="t"><span class="tile"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2.5"/><line x1="10" y1="18" x2="14" y2="18"/></svg></span><span class="htitle">本周手机销量榜</span></div><span class="cap">6月25日</span></div>
<div class="ins"><i></i>iPhone 16 Pro 反超登顶，三星跌落榜首</div>
<div class="feat" id="feat"></div>
<div id="lb"></div>
<div class="ft"><span class="cap">榜单 6 款 · 合计 8,760 台</span><span class="cap">点任意行看走势</span></div>
</div>
<script>
const NS='http://www.w3.org/2000/svg',mk=(p,t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);p.appendChild(e);return e};
const LB=[
 {n:'iPhone 16 Pro',v:2840,d:2,tr:[2100,2240,2050,2380,2600,2840]},
 {n:'Galaxy S24',v:1920,d:-1,tr:[2400,2330,2360,2210,2050,1920]},
 {n:'Pixel 9',v:1310,d:-1,tr:[1520,1470,1490,1410,1360,1310]},
 {n:'小米 14',v:1040,d:0,tr:[900,985,1015,1000,1030,1040]},
 {n:'OPPO Find X7',v:890,d:'new',tr:[0,0,0,0,520,890]},
 {n:'vivo X100',v:760,d:-1,tr:[840,810,795,805,780,760]},
];
const max=LB[0].v,total=LB.reduce((s,r)=>s+r.v,0);
const chip=(d,big)=>{const c=d==='new'?'dnw':d>0?'dup':d<0?'ddn':'dsm',t=d==='new'?'NEW':d>0?'▲'+d:d<0?'▼'+(-d):'—';return '<span class="'+(big?'dl ':'dm ')+c+'">'+t+'</span>';};
const lb=document.getElementById('lb');
lb.innerHTML=LB.map((r,i)=>'<div class="row" data-i="'+i+'"><div class="rk">'+(i+1)+'</div>'
 +'<div class="mid"><div class="nm">'+r.n+chip(r.d,0)+'</div><div class="bar"><i style="width:'+(r.v/max*100).toFixed(1)+'%;animation-delay:'+(.06*i).toFixed(2)+'s"></i></div></div>'
 +'<div class="rv tn">'+r.v.toLocaleString()+'</div></div>').join('');
const feat=document.getElementById('feat');
function render(i){const r=LB[i],share=Math.round(r.v/total*100),
  last=r.d==='new'?'上周新上榜':r.d===0?'排名持平':'上周第 '+((i+1)+r.d);
  document.querySelectorAll('.row').forEach(x=>x.classList.toggle('on',+x.dataset.i===i));
  feat.innerHTML='<div class="ftop"><div><div class="frk"><span class="fbadge">'+(i+1)+'</span><span class="fn">'+r.n+'</span></div>'
   +'<div class="fsub">占总销量 <b>'+share+'%</b> · '+last+'</div>'+chip(r.d,1)+'</div>'
   +'<div class="fval"><b>'+r.v.toLocaleString()+'<span class="u">台</span></b></div></div>'
   +'<svg class="spark" id="spk"></svg>';
  spark(r.tr);
}
function spark(tr){const sv=document.getElementById('spk'),W=sv.clientWidth,L=3,R=3,T=8,B=44,
  d=tr,N=d.length,lo=Math.min(...d),hi=Math.max(...d),X=k=>L+(W-L-R)*k/(N-1),Y=v=>B-(B-T)*(v-lo)/((hi-lo)||1),
  dd=d.map((v,k)=>(k?'L':'M')+X(k).toFixed(1)+','+Y(v).toFixed(1)).join('');
  const df=mk(sv,'defs',{}),fg=mk(df,'linearGradient',{id:'fg',x1:0,y1:0,x2:0,y2:1});
  mk(fg,'stop',{offset:0,style:'stop-color:var(--a);stop-opacity:.22'});mk(fg,'stop',{offset:1,style:'stop-color:var(--a);stop-opacity:0'});
  mk(sv,'path',{class:'ar',d:dd+`L${X(N-1).toFixed(1)},${B} L${X(0).toFixed(1)},${B} Z`,style:'fill:url(#fg)'});
  const ln=mk(sv,'path',{d:dd,style:'fill:none;stroke:var(--a);stroke-width:2.6;stroke-linejoin:round;stroke-linecap:round'});
  const Ld=ln.getTotalLength();ln.style.strokeDasharray=Ld;ln.style.strokeDashoffset=Ld;ln.style.animation='draw .7s var(--ez) forwards';
  mk(sv,'circle',{cx:X(N-1),cy:Y(d[N-1]),r:4,style:'fill:var(--a);stroke:var(--card);stroke-width:2.5'});
}
const st=document.createElement('style');st.textContent='@keyframes draw{to{stroke-dashoffset:0}}.ar{animation:afade .5s var(--ez) both}@keyframes afade{from{opacity:0}}';document.head.appendChild(st);
document.querySelectorAll('.row').forEach(x=>x.onclick=()=>render(+x.dataset.i));
render(0);
</script></body></html>
