<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>本月支出</title>
<style>
:root{color-scheme:light dark;
--bg:light-dark(#edebe7,#0d0d0f);--card:light-dark(#fff,#1c1c1e);
--ink:light-dark(#16181c,#f2f3f5);--mut:light-dark(#6e7480,#9ba1ac);--fnt:light-dark(#a8adb8,#5d646f);
--inset:light-dark(#f4f5f7,#26262a);--hl:color-mix(in srgb,var(--fnt) 12%,transparent);
--a:#6366f1;--at:light-dark(#4346ad,#a7abf7);
--up:light-dark(#b91c1c,#f87171);
--ez:cubic-bezier(.16,1,.3,1);
--sh:0 1px 2px light-dark(rgba(16,24,40,.04),rgba(0,0,0,.5)),0 10px 28px light-dark(rgba(16,24,40,.07),rgba(0,0,0,.4))}
[data-theme=light]{color-scheme:light}[data-theme=dark]{color-scheme:dark}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;background:var(--bg);color:var(--ink);font-family:-apple-system,system-ui,'Segoe UI',sans-serif}
.card{width:min(430px,100%);background:var(--card);border-radius:20px;padding:24px;box-shadow:var(--sh)}
.lb{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--mut)}
.cap{font-size:.78rem;color:var(--mut)}
.hd{display:flex;align-items:center;gap:10px}
.tile{flex:none;width:22px;height:22px;border-radius:7px;background:color-mix(in srgb,var(--a) 14%,transparent);display:grid;place-items:center}
.tile svg{width:13px;height:13px;fill:var(--at)}
.htitle{font-size:.82rem;font-weight:600}
.hero{display:flex;align-items:baseline;gap:11px;margin-top:16px}
.hero b{font-size:clamp(2.2rem,8vw,2.8rem);font-weight:750;letter-spacing:-.025em;font-variant-numeric:tabular-nums;line-height:1}
.hero .u{font-size:.42em;color:var(--mut);font-weight:600;margin-left:2px}
.chip{font-size:.68rem;font-weight:650;padding:3px 9px;border-radius:7px;font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;gap:3px}
.cup{background:color-mix(in srgb,var(--up) 12%,transparent);color:var(--up)}
.chip svg{width:8px;height:8px;fill:currentColor}
.ctx{margin-top:7px}
.ins{display:flex;align-items:center;gap:8px;font-size:.9rem;font-weight:700;margin:16px 0 16px}
.ins i{flex:none;width:7px;height:7px;border-radius:99px;background:var(--a)}
.cc{background:var(--inset);border-radius:15px;padding:15px 16px 15px;cursor:pointer;transition:box-shadow .18s var(--ez)}
.cc+.cc{margin-top:10px}
.cc:active{transform:scale(.994)}
.cc.on{box-shadow:inset 0 0 0 1.5px color-mix(in srgb,var(--a) 32%,transparent)}
.cct{display:flex;align-items:center;gap:8px}
.ccn{font-size:.94rem;font-weight:700}
.ccd{margin-left:auto;font-size:.64rem;font-weight:650;padding:2px 8px;border-radius:6px;font-variant-numeric:tabular-nums}
.dup{background:color-mix(in srgb,var(--up) 14%,transparent);color:var(--up)}
.dfl{color:var(--fnt);background:var(--hl)}
.ccv{display:flex;align-items:baseline;gap:9px;margin:10px 0 12px}
.ccv b{font-size:1.55rem;font-weight:750;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
.ccv .u{font-size:.6em;color:var(--mut);font-weight:600;margin-left:1px}
.ccv .o{margin-left:auto;font-size:.74rem;color:var(--fnt);font-variant-numeric:tabular-nums;align-self:flex-end}
.bw{position:relative;height:9px;border-radius:5px}
.bg{position:absolute;top:0;height:100%;border-radius:5px;background:color-mix(in srgb,var(--fnt) 42%,transparent);transition:width .6s var(--ez)}
.bf{position:absolute;top:0;left:0;height:100%;border-radius:5px;transition:width .6s var(--ez)}
.ex{max-height:0;overflow:hidden;transition:max-height .22s var(--ez)}
.cc.on .ex{max-height:40px}
.exr{display:flex;gap:16px;padding-top:12px;margin-top:12px;border-top:1px solid var(--hl);font-size:.74rem;color:var(--mut)}
.exr b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
</style></head><body><div class="card">
<div class="hd"><span class="tile"><svg viewBox="0 0 24 24"><path d="M3 4h18a1 1 0 0 1 1 1v3H2V5a1 1 0 0 1 1-1Zm-1 6h20v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-9Zm3 5h6v2H5v-2Z"/></svg></span><span class="htitle">本月支出</span><span class="lb" style="margin-left:auto">6月 · 环比上月</span></div>
<div class="hero"><b id="hv">0<span class="u">元</span></b><span class="chip cup"><svg viewBox="0 0 10 10"><path d="M5 1 9 8H1Z"/></svg>+1,100 · 15%</span></div>
<div class="cap ctx">上月 7,320 元 · 多花 1,100 元</div>
<div class="ins"><i></i>涨在餐饮和打车,两项贡献 1,500 元</div>
<div id="cards"></div>
</div>
<script>
const cnt=(el,t)=>{const a=performance.now(),f=n=>{const p=Math.min((n-a)/700,1);el.firstChild.textContent=Math.round(t*(1-(1-p)**3)).toLocaleString();if(p<1)requestAnimationFrame(f)};requestAnimationFrame(f)};
cnt(document.getElementById('hv'),8420);
const D=[['餐饮',2400,3200],['打车',1100,1800],['其它',3820,3420]];
const hi=Math.max(...D.flatMap(d=>[d[1],d[2]])),TOTAL=8420,
gross=D.reduce((s,d)=>s+Math.max(0,d[2]-d[1]),0);
const wrap=document.getElementById('cards');
D.forEach(([n,o,v],i)=>{
  const rise=v>=o,pct=Math.round((v-o)/o*100),
  share=Math.round(v/TOTAL*100),
  contrib=rise?Math.round((v-o)/gross*100)+'% 涨幅来源':'省 '+(o-v)+' 元';
  const c=document.createElement('div');c.className='cc';c.dataset.i=i;
  c.innerHTML=
   '<div class="cct"><span class="ccn">'+n+'</span><span class="ccd '+(rise?'dup':'dfl')+'">'+(rise?'▲ +'+pct:pct)+'%</span></div>'
   +'<div class="ccv"><b>'+v.toLocaleString()+'<span class="u">元</span></b><span class="o">上月 '+o.toLocaleString()+'</span></div>'
   +'<div class="bw"><div class="bg" style="width:'+(o/hi*100).toFixed(1)+'%"></div><div class="bf" style="width:'+(v/hi*100).toFixed(1)+'%;background:'+(rise?'var(--a)':'var(--mut)')+'"></div></div>'
   +'<div class="ex"><div class="exr"><span>占本月总支出 <b>'+share+'%</b></span><span>'+(rise?'占涨幅 <b>'+Math.round((v-o)/gross*100)+'%</b>':'较上月 <b>'+contrib+'</b>')+'</span></div></div>';
  c.onclick=()=>c.classList.toggle('on');
  wrap.appendChild(c);
});
</script></body></html>
